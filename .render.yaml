services:
  - type: web
    name: cyberpunk-drone-c2
    env: ruby
    buildCommand: bundle install
    startCommand: bundle exec rackup config.ru -p $PORT -o 0.0.0.0 -s webrick
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: drone_db
          property: connectionString
      - key: RACK_ENV
        value: production
