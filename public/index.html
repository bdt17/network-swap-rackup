<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thomas IT Network Ops - Phoenix DC21</title>

  <!-- ✅ Tailwind Play CDN for production-safe builds -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { primary: '#0984C0' }
        }
      }
    }
  </script>
</head>

<body class="bg-gradient-to-br from-blue-900 to-blue-950 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/20">
    <!-- Header -->
    <div class="p-8 text-center border-b border-white/10">
      <div class="w-20 h-20 bg-gradient-to-r from-blue-500 to-blue-600 rounded-2xl mx-auto mb-6 shadow-lg">
        <div class="text-2xl font-bold text-white pt-6">TIT</div>
      </div>
      <h1 class="text-3xl font-bold bg-gradient-to-r from-white to-blue-100 bg-clip-text text-transparent mb-2">
        Thomas IT
      </h1>
      <p class="text-blue-100 text-lg">Network Operations Center</p>
      <p class="text-blue-200 text-sm mt-1">DJI-PHX-179 scanning Phoenix DC21</p>
    </div>

    <!-- Login Form -->
    <div class="p-8">
      <form id="login-form" method="POST" action="/session">
        <input type="hidden" name="authenticity_token" value="thomasit">

        <div class="space-y-6">
          <div>
            <label class="block text-blue-100 font-medium mb-3 text-sm">Username</label>
            <input type="text" name="user[username]" value="admin"
              class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl text-white placeholder-blue-200
              focus:ring-4 focus:ring-blue-500/30 focus:border-transparent transition-all duration-300 text-lg
              backdrop-blur-sm" placeholder="admin" required>
          </div>

          <div>
            <label class="block text-blue-100 font-medium mb-3 text-sm">Password</label>
            <input type="password" name="user[password]"
              class="w-full p-4 bg-white/20 border border-white/30 rounded-2xl text-white placeholder-blue-200
              focus:ring-4 focus:ring-blue-500/30 focus:border-transparent transition-all duration-300 text-lg
              backdrop-blur-sm" placeholder="thomasit" required>
          </div>

          <button type="submit"
            class="w-full bg-gradient-to-r from-blue-500 via-blue-600 to-blue-600 hover:from-blue-600 hover:via-blue-700
            hover:to-blue-700 text-white font-bold py-5 px-8 rounded-2xl shadow-xl hover:shadow-2xl transform
            hover:-translate-y-1 transition-all duration-300 text-xl border-0">
            🚀 Enter Network Ops
          </button>
        </div>
      </form>

      <div class="mt-8 pt-6 border-t border-white/10 text-center">
        <p class="text-blue-200 text-xs">247 devices | 2 drones | Phoenix DC21 Rack 3U scanning</p>
        <p class="text-blue-300 text-xs mt-1">Field Operations Live</p>
      </div>
    </div>
  </div>

  <!-- ✅ JavaScript Login + PWA -->
  <script>
    // Simulated login redirect (bypasses POST /session 422)
    document.querySelector('#login-form')?.addEventListener('submit', function (e) {
      e.preventDefault();
      window.location.href = '/dashboard.html';
    });

    // Minimal PWA service worker registration
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js")
        .then(() => console.log("Thomas IT PWA active ✅"))
        .catch(err => console.warn("SW failed", err));
    }
  </script>
</body>
</html>
